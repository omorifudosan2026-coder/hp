<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 | おもりさん不動産</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        secondary: '#fbbf24',
                        accent: '#fb923c',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-800">
                    <span class="text-primary">おもりさん不動産</span> 管理画面
                </h1>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600" id="user-email"></span>
                    <a href="index.html" class="text-gray-600 hover:text-primary transition">公開サイトへ →</a>
                    <button id="logout-btn" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                        ログアウト
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="bg-white border-b">
        <div class="container mx-auto px-4">
            <nav class="flex space-x-8">
                <button onclick="switchTab('properties')" id="tab-properties" class="tab-btn py-4 border-b-2 border-primary text-primary font-semibold">
                    物件管理
                </button>
                <button onclick="switchTab('news')" id="tab-news" class="tab-btn py-4 border-b-2 border-transparent text-gray-600 hover:text-primary">
                    お知らせ管理
                </button>
                <button onclick="switchTab('works')" id="tab-works" class="tab-btn py-4 border-b-2 border-transparent text-gray-600 hover:text-primary">
                    施工事例管理
                </button>
            </nav>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8">
        <!-- Properties Tab -->
        <div id="content-properties" class="tab-content">
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">物件一覧</h2>
                    <button onclick="openPropertyModal()" class="px-6 py-2 bg-primary text-white rounded-lg font-semibold hover:bg-orange-600 transition">
                        ＋ 新規追加
                    </button>
                </div>
                <div id="properties-list" class="space-y-4">
                    <div class="text-center py-8 text-gray-500">読み込み中...</div>
                </div>
            </div>
        </div>

        <!-- News Tab -->
        <div id="content-news" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">お知らせ一覧</h2>
                    <button onclick="openNewsModal()" class="px-6 py-2 bg-primary text-white rounded-lg font-semibold hover:bg-orange-600 transition">
                        ＋ 新規追加
                    </button>
                </div>
                <div id="news-list" class="space-y-4">
                    <div class="text-center py-8 text-gray-500">読み込み中...</div>
                </div>
            </div>
        </div>

        <!-- Works Tab -->
        <div id="content-works" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">施工事例一覧</h2>
                    <button onclick="openWorkModal()" class="px-6 py-2 bg-primary text-white rounded-lg font-semibold hover:bg-orange-600 transition">
                        ＋ 新規追加
                    </button>
                </div>
                <div id="works-list" class="space-y-4">
                    <div class="text-center py-8 text-gray-500">読み込み中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Property Modal -->
    <div id="property-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-gray-900" id="property-modal-title">物件を追加</h3>
                    <button onclick="closePropertyModal()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <form id="property-form" class="space-y-4">
                    <input type="hidden" id="property-id">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">物件名 *</label>
                            <input type="text" id="property-title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">エリア *</label>
                            <input type="text" id="property-area" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">価格（万円） *</label>
                            <input type="number" id="property-price" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">間取り *</label>
                            <input type="text" id="property-layout" required placeholder="例: 2LDK" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">専有面積（㎡） *</label>
                            <input type="number" step="0.1" id="property-area-size" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">築年数 *</label>
                            <input type="number" id="property-age" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">ラベル</label>
                            <select id="property-label" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">なし</option>
                                <option value="NEW">NEW</option>
                                <option value="人気">人気</option>
                                <option value="おすすめ">おすすめ</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">画像</label>
                        <input type="file" id="property-image-file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-primary file:text-white hover:file:bg-orange-600">
                        <div id="property-image-preview" class="mt-2 hidden">
                            <img id="property-image-preview-img" class="max-w-full h-48 object-cover rounded-lg">
                            <p class="text-xs text-gray-500 mt-1">プレビュー</p>
                        </div>
                        <input type="hidden" id="property-image">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">説明</label>
                        <textarea id="property-description" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
                    </div>
                    <div class="flex justify-end space-x-3 pt-4">
                        <button type="button" onclick="closePropertyModal()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
                            キャンセル
                        </button>
                        <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-orange-600 transition">
                            保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- News Modal -->
    <div id="news-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-gray-900" id="news-modal-title">お知らせを追加</h3>
                    <button onclick="closeNewsModal()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <form id="news-form" class="space-y-4">
                    <input type="hidden" id="news-id">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">タイトル *</label>
                        <input type="text" id="news-title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">日付 *</label>
                            <input type="date" id="news-date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">カテゴリー *</label>
                            <select id="news-category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="お知らせ">お知らせ</option>
                                <option value="イベント">イベント</option>
                                <option value="メディア掲載">メディア掲載</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">本文 *</label>
                        <textarea id="news-content" rows="6" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">画像</label>
                        <input type="file" id="news-image-file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-primary file:text-white hover:file:bg-orange-600">
                        <div id="news-image-preview" class="mt-2 hidden">
                            <img id="news-image-preview-img" class="max-w-full h-48 object-cover rounded-lg">
                            <p class="text-xs text-gray-500 mt-1">プレビュー</p>
                        </div>
                        <input type="hidden" id="news-image">
                    </div>
                    <div class="flex justify-end space-x-3 pt-4">
                        <button type="button" onclick="closeNewsModal()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
                            キャンセル
                        </button>
                        <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-orange-600 transition">
                            保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Work Modal -->
    <div id="work-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-gray-900" id="work-modal-title">施工事例を追加</h3>
                    <button onclick="closeWorkModal()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <form id="work-form" class="space-y-4">
                    <input type="hidden" id="work-id">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">タイトル *</label>
                        <input type="text" id="work-title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    <div class="grid md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">エリア *</label>
                            <input type="text" id="work-area" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">間取り *</label>
                            <input type="text" id="work-layout" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">施工費用（万円） *</label>
                            <input type="number" id="work-cost" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">説明 *</label>
                        <textarea id="work-description" rows="4" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">メイン画像 *</label>
                        <input type="file" id="work-image-file" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-primary file:text-white hover:file:bg-orange-600">
                        <div id="work-image-preview" class="mt-2 hidden">
                            <img id="work-image-preview-img" class="max-w-full h-48 object-cover rounded-lg">
                            <p class="text-xs text-gray-500 mt-1">プレビュー</p>
                        </div>
                        <input type="hidden" id="work-image">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">追加画像（複数可）</label>
                        <input type="file" id="work-images-file" accept="image/*" multiple class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-primary file:text-white hover:file:bg-orange-600">
                        <div id="work-images-preview" class="mt-2 hidden grid grid-cols-3 gap-2">
                        </div>
                        <input type="hidden" id="work-images">
                    </div>
                    <div class="flex justify-end space-x-3 pt-4">
                        <button type="button" onclick="closeWorkModal()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
                            キャンセル
                        </button>
                        <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-orange-600 transition">
                            保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Admin Script -->
    <script src="js/admin-firebase.js"></script>
</body>
</html>
